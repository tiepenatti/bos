<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOS — Browser OpenCV Studio</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>🎬 BOS</h1>
        <p class="subtitle">Browser OpenCV Studio</p>
      </header>

      <main>
        <!-- Step 1: Upload -->
        <section id="upload-section" class="card">
          <h2>1. Pick a Video</h2>
          <div id="drop-zone" class="drop-zone">
            <span class="drop-icon">📁</span>
            <p>Drag & drop a video here, or click to browse</p>
            <p class="hint">MP4, AVI, MOV · max 200 MB</p>
            <input type="file" id="file-input" accept="video/*" hidden />
          </div>
          <div id="file-info" class="file-info hidden"></div>
          <button id="upload-btn" class="btn primary" disabled>Upload &amp; Process</button>
        </section>

        <!-- Step 2: Progress -->
        <section id="progress-section" class="card hidden">
          <h2>2. Processing…</h2>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <p id="progress-label" class="progress-label">Uploading…</p>
        </section>

        <!-- Step 3: Results -->
        <section id="results-section" class="card hidden">
          <h2>3. Results</h2>
          <div id="summary" class="summary"></div>

          <div class="results-actions">
            <button id="download-zip-btn" class="btn primary">⬇ Download All (ZIP)</button>
          </div>

          <h3>Extracted Frames</h3>
          <div id="frames-grid" class="frames-grid"></div>
        </section>

        <!-- Error banner -->
        <div id="error-banner" class="error-banner hidden"></div>
      </main>

      <footer>
        <p>Files are kept for <strong>1 hour</strong> then deleted automatically.</p>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
